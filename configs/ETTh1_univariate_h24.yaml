dataset:
  name: ETTh1
  path: data/raw/ETTh1.csv
  target: OT
  input_type: univariate

split:
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

window:
  input_len: 96
  horizon: 24

training:
  batch_size: 64
  seed: 42
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0
  grad_clip: 1.0
  early_stopping:
    patience: 10
    min_delta: 0.0
  scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 5

model:
  name: lstm
  hidden_dim: 64
  num_layers: 2
  dropout: 0.2
